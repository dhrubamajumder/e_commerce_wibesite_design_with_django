{% extends 'index.html' %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 85vh;">
    
    <div class="card shadow-lg border-0 p-5 text-center" style="max-width: 420px; width: 100%; border-radius: 15px;">
        
        <div class="mb-4">
            <i class="bi bi-person-lock" style="font-size: 50px; color: #0d6efd;"></i>
        </div>

        <h4 class="mb-3 fw-bold">Login Required</h4>

        <p class="text-muted mb-4">
            You need to log in to view your cart and place an order.
        </p>

        <a href="{% url 'login' %}" class="btn btn-primary w-100 mb-2">
            Login
        </a>

        <a href="{% url 'register' %}" class="btn btn-outline-secondary w-100">
            Create Account
        </a>

    </div>

</div>
{% endblock %}
